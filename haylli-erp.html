<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador - Guía Haylli ERP</title>
    <style>
        /* Estilos generales con fondo profundo */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Franja superior con Efecto Cristal Elegante */
        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Botón de Inicio con flecha */
        .btn-inicio {
            text-decoration: none;
            color: #f8fafc;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .btn-inicio:hover {
            opacity: 1;
            transform: translateX(-5px);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* Título superior derecho */
        .titulo-derecha {
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 1.5px;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-left: 3px solid #38bdf8; /* Detalle elegante en azul */
            padding-left: 15px;
        }

        /* Contenedor principal */
        .main-container {
            flex-grow: 1;
            padding: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Iframe con marco estilizado */
        iframe {
            width: 85%;
            height: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            background: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            iframe { width: 100%; height: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="índece.html" class="btn-inicio">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Inicio
        </a>

        <div class="titulo-derecha">GUÍA HAYLLI ERP</div>
    </header>

    <div class="main-container">
        <iframe 
            src="https://drive.google.com/file/d/1pQJkR7rXAcsuWMAfe6wjzdPWnoc1MJyo/preview" 
            allow="autoplay">
        </iframe>
    </div>

</body>
</html>
