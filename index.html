<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NELYESS - Capacitación</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #004a99;
            --secondary: #00c6ff;
            --dark: #1e293b;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #f0f2f5; 
            color: var(--dark); 
            overflow-x: hidden; 
        }

        /* PORTADA PRINCIPAL */
        .hero {
            height: 100vh;
            background: linear-gradient(135deg, rgba(0,74,153,0.9), rgba(0,198,255,0.8)), 
                        url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1200');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 8vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            opacity: 0.9;
            max-width: 600px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .btn-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 20px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-card:hover {
            background: var(--white);
            color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .btn-card i { font-size: 2.5rem; }

        /* --- ESTILOS DEL CHATBOT --- */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .chat-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-btn:hover {
            transform: scale(1.1);
        }

        .chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 320px;
            height: 400px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .chat-window.active {
            display: flex;
        }

        .chat-header {
            background: var(--primary);
            color: white;
            padding: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-chat {
            cursor: pointer;
            font-size: 1.2rem;
        }

        .chat-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            max-width: 80%;
            line-height: 1.4;
        }

        .bot-message {
            background: #e2e8f0;
            color: var(--dark);
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .user-message {
            background: var(--secondary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .chat-footer {
            padding: 10px;
            background: white;
            display: flex;
            border-top: 1px solid #e2e8f0;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            outline: none;
            font-family: 'Poppins', sans-serif;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin-left: 10px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.2rem; }
            .grid-buttons { grid-template-columns: 1fr 1fr; }
            .chat-widget { bottom: 15px; right: 15px; }
            .chat-window { width: 280px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div style="margin-bottom: 20px;">
            <i class="fas fa-graduation-cap" style="font-size: 3rem; color: var(--secondary);"></i>
        </div>
        <h1>NELYESS CAPACITACIÓN</h1>
        <p>Portal operativo centralizado para el equipo comercial y de soporte</p>

        <div class="grid-buttons">
            <a href="guia-comercial.html" class="btn-card">
                <i class="fas fa-book-open"></i>
                <span>GUÍA COMERCIAL</span>
            </a>
            
            <a href="ventas.html" class="btn-card">
                <i class="fas fa-chart-line"></i>
                <span>VENTAS</span>
            </a>
            
            <a href="posventa.html" class="btn-card">
                <i class="fas fa-headset"></i>
                <span>POSVENTA</span>
            </a>
            
            <a href="haylli-erp.html" class="btn-card">
                <i class="fas fa-laptop-code"></i>
                <span>HAYLLI ERP</span>
            </a>
        </div>
    </section>

    <div class="chat-widget">
        <button class="chat-btn" id="chatToggle">
            <i class="fas fa-robot"></i>
        </button>

        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <span><i class="fas fa-robot"></i> Asistente Nelyess</span>
                <i class="fas fa-times close-chat" id="closeChat"></i>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="message bot-message">¡Hola! Extraigo información de esta página en tiempo real. ¿Sobre qué área quieres saber?</div>
            </div>
            <div class="chat-footer">
                <input type="text" class="chat-input" id="chatInput" placeholder="Escribe aquí...">
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const chatToggle = document.getElementById('chatToggle');
        const closeChat = document.getElementById('closeChat');
        const chatWindow = document.getElementById('chatWindow');
        const sendBtn = document.getElementById('sendBtn');
        const chatInput = document.getElementById('chatInput');
        const chatBody = document.getElementById('chatBody');

        // Controles de la ventana
        chatToggle.addEventListener('click', () => { chatWindow.classList.toggle('active'); });
        closeChat.addEventListener('click', () => { chatWindow.classList.remove('active'); });

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
            messageDiv.textContent = text;
            chatBody.appendChild(messageDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // Extrae las frases completas de la página para respuestas más limpias
        function obtenerLineasDePagina() {
            const clonCuerpo = document.body.cloneNode(true);
            const chatCopia = clonCuerpo.querySelector('.chat-widget');
            if (chatCopia) chatCopia.remove(); // Ignora el texto del propio chat
            
            // Divide el texto visible de la página en líneas separadas
            return clonCuerpo.innerText.split('\n')
                .map(linea => linea.trim())
                .filter(linea => linea.length > 3); // Ignora líneas vacías o muy cortas
        }

        // El cerebro dinámico mejorado
        function getBotResponse(input) {
            const textoUsuario = input.toLowerCase().trim();
            
            if (textoUsuario === "hola" || textoUsuario === "saludos") {
                return "¡Hola! Hazme una pregunta y buscaré la respuesta en la página.";
            }

            // Obtenemos las líneas de texto actualizadas
            const lineasWeb = obtenerLineasDePagina();
            const palabrasClave = textoUsuario.split(" ").filter(p => p.length > 3);
            
            // Buscamos si alguna palabra clave coincide con una línea de la web
            for (let palabra of palabrasClave) {
                const lineaEncontrada = lineasWeb.find(linea => linea.toLowerCase().includes(palabra));
                
                if (lineaEncontrada) {
                    return `En la página encontré esto: "${lineaEncontrada}"`;
                }
            }

            return "Lo siento, esa información no existe actualmente en esta página. Solo puedo responder en base a lo que se ve aquí.";
        }

        // Enviar mensaje
        function handleSend() {
            const text = chatInput.value.trim();
            if (text === '') return;

            addMessage(text, 'user');
            chatInput.value = '';

            // Pequeño retraso para que se sienta natural
            setTimeout(() => {
                const response = getBotResponse(text);
                addMessage(response, 'bot');
            }, 500);
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
