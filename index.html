<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NELYESS - Capacitación</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #004a99;
            --secondary: #00c6ff;
            --dark: #1e293b;
            --white: #ffffff;
            --gray: #f0f2f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, rgba(0,74,153,0.9), rgba(0,198,255,0.8)), 
                        url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1200');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--dark); 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        .pantalla {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- ESTILOS DEL PORTAL PRINCIPAL --- */
        #portal-principal {
            text-align: center;
            color: white;
        }

        .hero-title {
            font-size: clamp(2.2rem, 8vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .hero-subtitle {
            font-size: 1.1rem;
            margin-bottom: 40px;
            opacity: 0.9;
            max-width: 600px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 40px;
        }

        .btn-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 20px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-card:hover {
            background: var(--white);
            color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .btn-card i { font-size: 2.5rem; }

        /* --- ESTILOS DEL BOTÓN FLOTANTE DE WHATSAPP --- */
        .whatsapp-flotante {
            position: fixed; /* Esto lo mantiene fijo en la pantalla */
            bottom: 30px; /* Distancia desde abajo */
            right: 30px; /* Distancia desde la derecha */
            background-color: #25d366;
            color: #fff;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px; /* Tamaño del icono */
            box-shadow: 2px 2px 15px rgba(0,0,0,0.3);
            z-index: 1000; /* Asegura que esté por encima de todo */
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .whatsapp-flotante:hover {
            background-color: #128c7e;
            transform: scale(1.1); /* Efecto de crecimiento al pasar el mouse */
            color: white;
            box-shadow: 2px 2px 20px rgba(37, 211, 102, 0.6);
        }

        @media (max-width: 600px) {
            .grid-buttons { grid-template-columns: 1fr 1fr; }
            .whatsapp-flotante {
                bottom: 20px;
                right: 20px;
                width: 55px;
                height: 55px;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

    <section id="portal-principal" class="pantalla">
        <div style="margin-bottom: 20px;">
            <i class="fas fa-graduation-cap" style="font-size: 3rem; color: var(--secondary);"></i>
        </div>
        <h1 class="hero-title">NELYESS CAPACITACIÓN</h1>
        <p class="hero-subtitle">Portal operativo centralizado para el equipo comercial y de soporte</p>

        <div class="grid-buttons">
            <a href="guia-comercial.html" class="btn-card">
                <i class="fas fa-book-open"></i>
                <span>GUÍA COMERCIAL</span>
            </a>
            
            <a href="ventas.html" class="btn-card">
                <i class="fas fa-chart-line"></i>
                <span>VENTAS</span>
            </a>
            
            <a href="posventa.html" class="btn-card">
                <i class="fas fa-headset"></i>
                <span>POSVENTA</span>
            </a>
            
            <a href="haylli-erp.html" class="btn-card">
                <i class="fas fa-laptop-code"></i>
                <span>HAYLLI ERP</span>
            </a>

            <a href="asistencia.html" class="btn-card">
                <i class="fas fa-calendar-check"></i>
                <span>CÁLCULO DE REPORTE DE ASISTENCIA</span>
            </a>
        </div>
    </section>

    <a href="https://wa.me/51900070104?text=Hola,%20necesito%20soporte%20en%20el%20portal%20Nelyess" target="_blank" class="whatsapp-flotante" title="Contactar Soporte">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
