<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador - Guía Comercial</title>
    <style>
        /* Estilos generales y fondo elegante */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Franja superior con Efecto Cristal (Glassmorphism) */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* Soporte para Safari */
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        /* Estilo para el botón Inicio con flecha */
        .btn-inicio {
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            opacity: 0.9;
        }

        .btn-inicio:hover {
            opacity: 1;
            transform: translateX(-5px);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .btn-inicio svg {
            margin-right: 10px;
        }

        /* Estilo para el título superior derecho */
        .titulo-derecha {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        /* Contenedor del PDF */
        .container {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* El iframe con borde cristal */
        iframe {
            width: 90%;
            height: 95%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            background: white; /* Para que el PDF sea legible */
        }

        /* Responsivo para móviles */
        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            .titulo-derecha { font-size: 0.9rem; }
            iframe { width: 100%; height: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-inicio">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Inicio
        </a>

        <div class="titulo-derecha">GUÍA COMERCIAL</div>
    </header>

    <div class="container">
        <iframe 
            src="https://drive.google.com/file/d/1r3WBj9L57vqLtcwQGd4auY0U9i6V7kfw/view?usp=drive_lin" 
            allow="autoplay">
        </iframe>
    </div>

</body>
</html>
